<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body>
    <script type="module" src="./js/app.js"></script>
    <div class="body">
      <div class="grid flex-el">
        <span class="space"></span>
        <span class="space"></span>
        <span class="space"></span>
        <span class="space"></span>
        <span class="space"></span>
        <span class="space"></span>
        <span class="space"></span>
        <span class="space"></span>
        <span class="space"></span>
      </div>
      <div class="flex-el">
        <div>
          <h1 id="status">Espera...</h1>
          <div class="flex">
            <div>
              <label for="jugadorX">Jugador X</label><br />
              <input
                id="jugadorX"
                type="text"
                name="jugadorX"
                placeholder="Ingresar el nombre del jugador"
                required
              />
            </div>
            <div>
              <label for="jugadorO">Jugador O</label><br />
              <input
                id="jugadorO"
                type="text"
                placeholder="Ingresar el nombre del jugador"
                name="jugadorO"
                required
              />
            </div>
          </div>
          <div class="flex"><button class="btn">Reiniciar</button></div>
        </div>
      </div>
    </div>
  </body>
</html>
